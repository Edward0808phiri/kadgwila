<!doctype html>
<html lang="en-ZM">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Zikets — Event tickets across Zambia</title>
    <meta
      name="description"
      content="Find and book tickets for concerts, festivals, meetups and free community events across Zambia. Pay with Airtel Money, MTN MoMo or Zamtel Kwacha."
    />
    <meta name="theme-color" content="#0a0c0b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f5f3" media="(prefers-color-scheme: light)" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zikets" />
    <meta property="og:title" content="Zikets — Event tickets across Zambia" />
    <meta
      property="og:description"
      content="Concerts, festivals, meetups and free community events across Zambia. Pay with mobile money."
    />
    <meta name="twitter:card" content="summary_large_image" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M4 8.5A4.5 4.5 0 0 1 8.5 4h15A4.5 4.5 0 0 1 28 8.5v2.9a3.6 3.6 0 0 0 0 7.2v2.9A4.5 4.5 0 0 1 23.5 28h-15A4.5 4.5 0 0 1 4 23.5v-2.9a3.6 3.6 0 0 0 0-7.2V8.5Z' fill='%23f0913f'/><path d='M12 11.5h8.5L13 20.5h8.5' fill='none' stroke='%232a1705' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/></svg>"
    />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply the stored theme before first paint so the page never flashes.
      try {
        document.documentElement.dataset.theme = localStorage.getItem('zikets.theme') || 'dark'
      } catch (e) {
        document.documentElement.dataset.theme = 'dark'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Zikets needs JavaScript enabled to browse and book events.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
